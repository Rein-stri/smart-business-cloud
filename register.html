<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Smart Business Cloud</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Smart Business Cloud</h1>

<p>Buat akun baru</p>

</header>

<div class="container">

<div class="card">

<h2>Daftar Akun</h2>

<input
type="text"
id="fullname"
placeholder="Nama Lengkap">

<input
type="email"
id="email"
placeholder="Email">

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<input
type="password"
id="confirm"
placeholder="Konfirmasi Password">

<button onclick="register()">
Daftar
</button>

<p id="hasil"></p>

<p>
Sudah punya akun?
<a href="login.html">Login</a>
</p>

<p>
<a href="index.html">← Kembali ke Beranda</a>
</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
