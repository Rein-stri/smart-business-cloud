</head>

<body>

<header>

<p>Pengaturan Aplikasi</p>

<div class="container">

<div class="card">

<h2>Profil Pengguna</h2>

<label>Nama</label>

<input
type="text"
id="fullname"
placeholder="Nama Lengkap">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Email">

<button onclick="simpanProfil()">

Simpan Profil

</button>

</div>

<div class="card">

<h2>Keamanan</h2>

<label>Password Baru</label>

<input
type="password"
id="password"
placeholder="Password Baru">

<label>Konfirmasi Password</label>

<input
type="password"
id="confirm"
placeholder="Konfirmasi Password">

<button onclick="ubahPassword()">

Ubah Password

</button>

</div>

<div class="card">

<h2>Tampilan</h2>

<label>

<input type="checkbox">

Mode Gelap

</label>

<br><br>

<label>

<input type="checkbox">

Notifikasi Email

</label>

<br><br>

<button onclick="simpanPengaturan()">

Simpan Pengaturan

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
