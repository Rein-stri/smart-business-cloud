<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Business Cloud</title>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f7fb;
}

header{
background:#1565C0;
color:white;
padding:40px;
text-align:center;
}

nav{
background:#0D47A1;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
font-size:18px;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
box-sizing:border-box;
}

button{
padding:12px 25px;
margin:5px;
background:#1565C0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0D47A1;
}

#hasil{
margin-top:15px;
font-weight:bold;
color:#1565C0;
}

</style>

</head>

<body>

<header>

<h1>Smart Business Cloud</h1>

<p>Dashboard • AI • Cloud • Analitik • Laporan</p>

</header>

<nav>

<a href="/">Home</a>

<a href="#">Fitur</a>

<a href="#">Harga</a>

<a href="#">Kontak</a>

</nav>

<div class="container">

<div class="card">

<h2>Kelola Bisnis Lebih Mudah</h2>

<p>
Dashboard Penjualan, AI Assistant, Cloud Storage,
Laporan Otomatis, dan Analitik Pelanggan.
</p>

</div>

<div class="card">

<h2>Login / Register</h2>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="register()">
Register
</button>

<button onclick="login()">
Login
</button>

<p id="hasil"></p>

</div>

</div>

<script src="/script.js"></script>

</body>
</html>
